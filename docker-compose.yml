services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Монтируем данные — можно обновлять БД без пересборки
      - ./vkusvill_data:/app/vkusvill_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
